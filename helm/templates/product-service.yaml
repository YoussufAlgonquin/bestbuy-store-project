apiVersion: apps/v1
kind: Deployment
metadata:
  name: product-service
  namespace: {{ .Values.namespace }}
spec:
  replicas: {{ .Values.productService.replicas }}
  selector:
    matchLabels:
      app: product-service
  template:
    metadata:
      labels:
        app: product-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/actuator/prometheus"
        prometheus.io/port: "8080"
    spec:
      containers:
        - name: product-service
          image: {{ .Values.image.registry }}/bestbuy-product-service:{{ .Values.image.tag }}
          ports:
            - containerPort: {{ .Values.productService.port }}
          env:
            - name: MONGO_URI
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: MONGO_URI
            - name: SPRING_MONGODB_URI
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: MONGO_URI
            - name: PORT
              value: "{{ .Values.productService.port }}"
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: {{ .Values.productService.port }}
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: {{ .Values.productService.port }}
            initialDelaySeconds: 20
            periodSeconds: 10
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: product-service
  namespace: {{ .Values.namespace }}
spec:
  selector:
    app: product-service
  ports:
    - port: {{ .Values.productService.port }}
      targetPort: {{ .Values.productService.port }}
  type: ClusterIP
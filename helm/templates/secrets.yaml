apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
  namespace: {{ .Values.namespace }}
type: Opaque
data:
  # Helm base64-encodes plain values from values.yaml using b64enc.
  # Override at deploy time: --set secrets.mongoUri="..."
  MONGO_URI: {{ .Values.secrets.mongoUri | b64enc | quote }}
  RABBITMQ_URI: {{ .Values.secrets.rabbitmqUri | b64enc | quote }}
  AZURE_OPENAI_API_KEY: {{ .Values.secrets.azureOpenaiApiKey | b64enc | quote }}
  AZURE_OPENAI_ENDPOINT: {{ .Values.secrets.azureOpenaiEndpoint | b64enc | quote }}
  AZURE_OPENAI_DEPLOYMENT: {{ .Values.secrets.azureOpenaiDeployment | b64enc | quote }}

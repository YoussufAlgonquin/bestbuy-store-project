apiVersion: apps/v1
kind: Deployment
metadata:
  name: store-front
  namespace: {{ .Values.namespace }}
spec:
  replicas: {{ .Values.storeFront.replicas }}
  selector:
    matchLabels:
      app: store-front
  template:
    metadata:
      labels:
        app: store-front
    spec:
      containers:
        - name: store-front
          image: {{ .Values.image.registry }}/bestbuy-store-front:{{ .Values.image.tag }}
          ports:
            - containerPort: {{ .Values.storeFront.port }}
          livenessProbe:
            httpGet:
              path: /
              port: {{ .Values.storeFront.port }}
            initialDelaySeconds: 5
            periodSeconds: 15
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"
---
apiVersion: v1
kind: Service
metadata:
  name: store-front
  namespace: {{ .Values.namespace }}
spec:
  selector:
    app: store-front
  ports:
    - port: {{ .Values.storeFront.port }}
      targetPort: {{ .Values.storeFront.port }}
  type: LoadBalancer

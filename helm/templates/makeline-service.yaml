apiVersion: apps/v1
kind: Deployment
metadata:
  name: makeline-service
  namespace: {{ .Values.namespace }}
spec:
  replicas: {{ .Values.makelineService.replicas }}
  selector:
    matchLabels:
      app: makeline-service
  template:
    metadata:
      labels:
        app: makeline-service
    spec:
      containers:
        - name: makeline-service
          image: {{ .Values.image.registry }}/bestbuy-makeline-service:{{ .Values.image.tag }}
          ports:
            - containerPort: {{ .Values.makelineService.port }}
          env:
            - name: MONGO_URI
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: MONGO_URI
            - name: RABBITMQ_URI
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: RABBITMQ_URI
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.makelineService.port }}
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.makelineService.port }}
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: makeline-service
  namespace: {{ .Values.namespace }}
spec:
  selector:
    app: makeline-service
  ports:
    - port: {{ .Values.makelineService.port }}
      targetPort: {{ .Values.makelineService.port }}
  type: ClusterIP
